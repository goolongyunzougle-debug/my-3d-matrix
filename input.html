<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D MATRIX - 数据录入与补全</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0B0F19;
        }
    </style>
</head>
<body class="text-slate-100 font-sans antialiased p-4 md:p-8">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <header class="flex items-center justify-between border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-xl md:text-2xl font-black tracking-tight bg-gradient-to-r from-amber-400 to-orange-400 bg-clip-text text-transparent">
                    数据录入中心
                </h1>
                <p class="text-xs text-slate-400 mt-1">录入或补全福彩 3D 投注明细至 Supabase 数据库</p>
            </div>
            <a href="index.html" class="text-xs bg-slate-900 border border-slate-800 hover:border-slate-700 rounded-lg px-3 py-2 text-slate-300 transition-all">
                返回数据看板 ➔
            </a>
        </header>

        <section class="bg-slate-900/60 border border-amber-500/20 backdrop-blur-md rounded-2xl p-5 space-y-3 shadow-lg shadow-amber-950/5">
            <h2 class="text-xs font-bold text-amber-400 tracking-wider uppercase flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                ⏳ 待开奖数据快捷补全
            </h2>
            <p class="text-[11px] text-slate-400">点击下方未开奖的期号，即可一键将大底信息回填到表单进行数据补全。</p>
            <div id="pending-list" class="flex flex-wrap gap-2 pt-1">
                <span class="text-xs text-slate-500">正在检查未开奖数据...</span>
            </div>
        </section>

        <main class="bg-slate-900/40 border border-slate-800/80 backdrop-blur-md rounded-2xl p-6 shadow-xl space-y-6">
            
            <div id="alert-box" class="hidden text-sm p-4 rounded-xl border transition-all duration-300"></div>

            <div id="edit-indicator" class="hidden flex items-center justify-between bg-blue-500/10 border border-blue-500/20 px-4 py-2.5 rounded-xl text-xs text-blue-400">
                <span class="font-medium">🔄 当前正在补全：<strong id="edit-target" class="font-mono text-amber-400 font-bold"></strong> 这一期</span>
                <button type="button" onclick="cancelEditMode()" class="text-[11px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-1 rounded transition-all cursor-pointer">取消修改</button>
            </div>

            <form id="lottery-form" class="space-y-5" onsubmit="handleSubmit(event)">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">期号 (如 2026123)</label>
                        <input type="text" id="issue_number" required placeholder="请输入彩票期号" 
                               class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 font-mono text-sm text-slate-200 transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">投注/开奖日期</label>
                        <input type="date" id="draw_date" required
                               class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 text-sm text-slate-200 transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">投注类型</label>
                        <select id="bet_type" class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 text-sm text-slate-300 transition-all">
                            <option value="直选">直选</option>
                            <option value="组三">组三</option>
                            <option value="组六">组六</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">总投注金额 (元)</label>
                        <input type="number" id="bet_amount" required min="0" step="0.1" placeholder="0.0" 
                               class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 font-mono text-sm text-slate-200 transition-all">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 tracking-wide flex justify-between">
                        <span>已选大底号码 (支持批量粘贴)</span>
                        <span class="text-slate-500 font-normal">支持用逗号、空格或换行分隔</span>
                    </label>
                    <textarea id="my_bets" rows="4" required placeholder="例如：123, 456, 789 或者直接粘贴整行大底"
                              class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl p-4 font-mono text-sm text-slate-200 placeholder:text-slate-600 transition-all"></textarea>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 tracking-wide">开奖状态观测</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="flex items-center justify-center gap-2 border border-slate-800 rounded-xl p-3 text-sm cursor-pointer hover:border-slate-700 transition-all bg-black/10">
                            <input type="radio" name="status" id="status-pending" value="pending" checked onclick="toggleStatusFields('pending')" class="accent-amber-500"> 🛡️ 待开奖
                        </label>
                        <label class="flex items-center justify-center gap-2 border border-slate-800 rounded-xl p-3 text-sm cursor-pointer hover:border-slate-700 transition-all bg-black/10">
                            <input type="radio" name="status" id="status-won" value="won" onclick="toggleStatusFields('won')" class="accent-emerald-500"> 🎉 已中奖
                        </label>
                        <label class="flex items-center justify-center gap-2 border border-slate-800 rounded-xl p-3 text-sm cursor-pointer hover:border-slate-700 transition-all bg-black/10">
                            <input type="radio" name="status" id="status-lost" value="lost" onclick="toggleStatusFields('lost')" class="accent-rose-500"> ❌ 未中奖
                        </label>
                    </div>
                </div>

                <div id="result-fields" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-slate-800/60 pt-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">开奖号码 (3位连续数字)</label>
                        <input type="text" id="draw_numbers" maxlength="3" pattern="\d{3}" placeholder="例如直接输入：456" 
                               class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 font-mono text-sm text-slate-200 transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">总中奖金额 (元)</label>
                        <input type="number" id="prize_amount" min="0" step="0.1" placeholder="0.0" 
                               class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 font-mono text-sm text-slate-200 transition-all">
                    </div>
                </div>

                <button type="submit" id="submit-btn"
                        class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-slate-950 font-bold text-sm rounded-xl py-3 shadow-lg shadow-orange-950/20 active:scale-[0.99] transition-all cursor-pointer">
                    保存记录并上传数据库
                </button>

            </form>
        </main>
    </div>

    <script>
        // ==========================================
        // 🔐 Supabase 初始化配置
        // ==========================================
        const SUPABASE_URL = 'https://ybjgkfhcagqqfnqekycr.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamdrZmhjYWdxcWZucWVreWNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTk0OTUsImV4cCI6MjA5NzI3NTQ5NX0.jG4Hm9JPPBQ9J4jQKCtZDa5MDF_vGYlUo7drur8Xv6g';
        
        const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentPendingRecords = [];
        let editingRecordId = null;

        window.onload = async function() {
            resetFormDefaults();
            await fetchPendingRecords();
        };

        function resetFormDefaults() {
            document.getElementById('draw_date').valueAsDate = new Date();
            editingRecordId = null;
            document.getElementById('edit-indicator').classList.add('hidden');
            document.getElementById('submit-btn').innerText = '保存记录并上传数据库';
            document.getElementById('issue_number').removeAttribute('readonly');
            toggleStatusFields('pending');
        }

        // 🚀 优化：完全改用动态绑定事件监听，杜绝大底内有换行导致的 HTML 语法中断错误
        async function fetchPendingRecords() {
            const listContainer = document.getElementById('pending-list');
            
            const { data, error } = await dbClient
                .from('lottery_records')
                .select('*')
                .eq('status', 'pending')
                .order('issue_number', { ascending: false });

            if (error) {
                console.error('获取未开奖数据失败:', error);
                listContainer.innerHTML = `<span class="text-xs text-rose-400">加载未开奖记录失败</span>`;
                return;
            }

            currentPendingRecords = data || [];

            if (currentPendingRecords.length === 0) {
                listContainer.innerHTML = `<span class="text-xs text-slate-500 font-mono">🎉 完美！当前暂无待开奖的大底记录。</span>`;
                return;
            }

            listContainer.innerHTML = '';

            // 使用原生的纯净 DOM 创建，不通过字符串拼接 onclick 传递带有潜在断行的大底
            currentPendingRecords.forEach(record => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = "text-xs bg-slate-800/80 hover:bg-amber-500 hover:text-slate-950 border border-slate-700 hover:border-amber-400 font-mono text-slate-300 font-bold px-3 py-1.5 rounded-xl transition-all cursor-pointer";
                btn.innerText = `第 ${record.issue_number} 期`;
                
                // 纯安全的 JS 内部事件绑定
                btn.addEventListener('click', () => {
                    selectPendingRecord(record.id);
                });

                listContainer.appendChild(btn);
            });
        }

        function selectPendingRecord(id) {
            const record = currentPendingRecords.find(r => r.id === id);
            if (!record) return;

            editingRecordId = record.id;
            
            // 数据回填
            document.getElementById('issue_number').value = record.issue_number;
            document.getElementById('issue_number').setAttribute('readonly', 'readonly'); 
            document.getElementById('draw_date').value = record.draw_date || '';
            document.getElementById('bet_type').value = record.bet_type || '直选';
            document.getElementById('bet_amount').value = record.bet_amount || '';
            
            // 回填号码，多行格式或单行都可以完美兼容
            document.getElementById('my_bets').value = record.my_bets ? record.my_bets.join(', ') : '';

            // 自动开启中奖结果输入框
            document.getElementById('status-won').checked = true;
            toggleStatusFields('won');

            document.getElementById('edit-target').innerText = record.issue_number;
            document.getElementById('edit-indicator').classList.remove('hidden');
            document.getElementById('submit-btn').innerText = '🔄 更新未开奖记录并补全数据';
            
            document.getElementById('edit-indicator').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelEditMode() {
            document.getElementById('lottery-form').reset();
            resetFormDefaults();
        }

        function toggleStatusFields(status) {
            const resultFields = document.getElementById('result-fields');
            const drawNumbersInput = document.getElementById('draw_numbers');
            const prizeAmountInput = document.getElementById('prize_amount');

            if (status === 'pending') {
                resultFields.classList.add('hidden');
                drawNumbersInput.removeAttribute('required');
                prizeAmountInput.removeAttribute('required');
            } else {
                resultFields.classList.remove('hidden');
                drawNumbersInput.setAttribute('required', 'required');
                prizeAmountInput.setAttribute('required', 'required');
                
                if (status === 'lost') {
                    prizeAmountInput.value = 0;
                }
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const alertBox = document.getElementById('alert-box');
            
            submitBtn.disabled = true;
            submitBtn.innerText = editingRecordId ? '正在更新数据库...' : '正在上传数据...';
            
            const issue_number = document.getElementById('issue_number').value.trim();
            const draw_date = document.getElementById('draw_date').value;
            const bet_type = document.getElementById('bet_type').value;
            const bet_amount = parseFloat(document.getElementById('bet_amount').value);
            const status = document.querySelector('input[name="status"]:checked').value;

            const rawBetsText = document.getElementById('my_bets').value;
            const my_bets = rawBetsText
                .split(/[\s,，\n]+/) 
                .map(item => item.trim())
                .filter(item => item.length > 0);

            let draw_numbers = null;
            let prize_amount = 0;

            if (status !== 'pending') {
                const rawNumbers = document.getElementById('draw_numbers').value.trim();
                if (rawNumbers.length === 3) {
                    draw_numbers = rawNumbers.split('');
                } else {
                    draw_numbers = rawNumbers.split(/[\s,，]*/).filter(item => item.length > 0);
                }
                prize_amount = parseFloat(document.getElementById('prize_amount').value || 0);
            }

            const payload = {
                issue_number,
                draw_date,
                bet_type,
                bet_amount,
                my_bets,
                status,
                draw_numbers,
                prize_amount
            };

            let responseError = null;

            if (editingRecordId) {
                const { error } = await dbClient
                    .from('lottery_records')
                    .update(payload)
                    .eq('id', editingRecordId);
                responseError = error;
            } else {
                const { error } = await dbClient
                    .from('lottery_records')
                    .insert([payload]);
                responseError = error;
            }

            if (responseError) {
                console.error('操作失败:', responseError);
                alertBox.className = "text-sm p-4 rounded-xl border bg-rose-950/20 border-rose-500/30 text-rose-400";
                alertBox.innerText = `❌ 保存失败: ${responseError.message}`;
                alertBox.classList.remove('hidden');
                
                submitBtn.disabled = false;
                submitBtn.innerText = editingRecordId ? '🔄 更新未开奖记录并补全数据' : '保存记录并上传数据库';
            } else {
                alertBox.className = "text-sm p-4 rounded-xl border bg-emerald-950/20 border-emerald-500/30 text-emerald-400";
                alertBox.innerText = editingRecordId 
                    ? `🎉 第 ${issue_number} 期记录已完美补全并更新！` 
                    : `🎉 第 ${issue_number} 期记录已完美创建！已成功解析 ${my_bets.length} 注大底号码。`;
                alertBox.classList.remove('hidden');
                
                document.getElementById('lottery-form').reset();
                resetFormDefaults();
                
                await fetchPendingRecords();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
