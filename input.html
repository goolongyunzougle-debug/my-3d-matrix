<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D MATRIX - 数据录入</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0B0F19;
        }
    </style>
</head>
<body class="text-slate-100 font-sans antialiased p-4 md:p-8">

    <div class="max-w-2xl mx-auto space-y-8">
        
        <header class="flex items-center justify-between border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-xl md:text-2xl font-black tracking-tight bg-gradient-to-r from-amber-400 to-orange-400 bg-clip-text text-transparent">
                    数据录入中心
                </h1>
                <p class="text-xs text-slate-400 mt-1">录入福彩 3D 投注明细至 Supabase 数据库</p>
            </div>
            <a href="index.html" class="text-xs bg-slate-900 border border-slate-800 hover:border-slate-700 rounded-lg px-3 py-2 text-slate-300 transition-all">
                返回数据看板 ➔
            </a>
        </header>

        <main class="bg-slate-900/40 border border-slate-800/80 backdrop-blur-md rounded-2xl p-6 shadow-xl space-y-6">
            
            <div id="alert-box" class="hidden text-sm p-4 rounded-xl border transition-all duration-300"></div>

            <form id="lottery-form" class="space-y-5" onsubmit="handleSubmit(event)">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">期号 (如 2026123)</label>
                        <input type="text" id="issue_number" required placeholder="请输入彩票期号" 
                               class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 font-mono text-sm text-slate-200 transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">投注/开奖日期</label>
                        <input type="date" id="draw_date" required
                               class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 text-sm text-slate-200 transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">投注类型</label>
                        <select id="bet_type" class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 text-sm text-slate-300 transition-all">
                            <option value="直选">直选</option>
                            <option value="组三">组三</option>
                            <option value="组六">组六</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">总投注金额 (元)</label>
                        <input type="number" id="bet_amount" required min="0" placeholder="0" 
                               class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 font-mono text-sm text-slate-200 transition-all">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 tracking-wide flex justify-between">
                        <span>已选大底号码 (支持批量粘贴)</span>
                        <span class="text-slate-500 font-normal">支持用逗号、空格或换行分隔</span>
                    </label>
                    <textarea id="my_bets" rows="4" required placeholder="例如：123, 456, 789 或者直接粘贴整行大底"
                              class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl p-4 font-mono text-sm text-slate-200 placeholder:text-slate-600 transition-all"></textarea>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 tracking-wide">开奖状态观测</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="flex items-center justify-center gap-2 border border-slate-800 rounded-xl p-3 text-sm cursor-pointer hover:border-slate-700 transition-all bg-black/10">
                            <input type="radio" name="status" value="pending" checked onclick="toggleStatusFields('pending')" class="accent-amber-500"> 🛡️ 待开奖
                        </label>
                        <label class="flex items-center justify-center gap-2 border border-slate-800 rounded-xl p-3 text-sm cursor-pointer hover:border-slate-700 transition-all bg-black/10">
                            <input type="radio" name="status" value="won" onclick="toggleStatusFields('won')" class="accent-emerald-500"> 🎉 已中奖
                        </label>
                        <label class="flex items-center justify-center gap-2 border border-slate-800 rounded-xl p-3 text-sm cursor-pointer hover:border-slate-700 transition-all bg-black/10">
                            <input type="radio" name="status" value="lost" onclick="toggleStatusFields('lost')" class="accent-rose-500"> ❌ 未中奖
                        </label>
                    </div>
                </div>

                <div id="result-fields" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-slate-800/60 pt-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">开奖号码 (3位数字)</label>
                        <input type="text" id="draw_numbers" placeholder="例如：4, 5, 6" 
                               class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 font-mono text-sm text-slate-200 transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-slate-400 tracking-wide">总中奖金额 (元)</label>
                        <input type="number" id="prize_amount" min="0" placeholder="0" 
                               class="w-full bg-black/40 border border-slate-800 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-2.5 font-mono text-sm text-slate-200 transition-all">
                    </div>
                </div>

                <button type="submit" id="submit-btn"
                        class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-slate-950 font-bold text-sm rounded-xl py-3 shadow-lg shadow-orange-950/20 active:scale-[0.99] transition-all cursor-pointer">
                    保存记录并上传数据库
                </button>

            </form>
        </main>
    </div>

    <script>
        // ==========================================
        // 🔐 Supabase 初始化配置
        // ==========================================
        const SUPABASE_URL = 'https://ybjgkfhcagqqfnqekycr.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamdrZmhjYWdxcWZucWVreWNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTk0OTUsImV4cCI6MjA5NzI3NTQ5NX0.jG4Hm9JPPBQ9J4jQKCtZDa5MDF_vGYlUo7drur8Xv6g';
        
        const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 设置默认日期为今天
        document.getElementById('draw_date').valueAsDate = new Date();

        // 动态切换开奖字段显示/隐藏
        function toggleStatusFields(status) {
            const resultFields = document.getElementById('result-fields');
            const drawNumbersInput = document.getElementById('draw_numbers');
            const prizeAmountInput = document.getElementById('prize_amount');

            if (status === 'pending') {
                resultFields.classList.add('hidden');
                drawNumbersInput.removeAttribute('required');
                prizeAmountInput.removeAttribute('required');
            } else {
                resultFields.classList.remove('hidden');
                drawNumbersInput.setAttribute('required', 'required');
                prizeAmountInput.setAttribute('required', 'required');
                
                // 如果是未中奖，奖金默认为 0
                if (status === 'lost') {
                    prizeAmountInput.value = 0;
                }
            }
        }

        // 提交表单逻辑
        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const alertBox = document.getElementById('alert-box');
            
            // 按钮进入加载状态
            submitBtn.disabled = true;
            submitBtn.innerText = '正在上传数据...';
            
            // 1. 获取基本表单数据
            const issue_number = document.getElementById('issue_number').value.trim();
            const draw_date = document.getElementById('draw_date').value;
            const bet_type = document.getElementById('bet_type').value;
            const bet_amount = parseFloat(document.getElementById('bet_amount').value);
            const status = document.querySelector('input[name="status"]:checked').value;

            // 2. 解析大底号码：将文本框中通过逗号、空格或换行分隔的号码提取成数组
            const rawBetsText = document.getElementById('my_bets').value;
            const my_bets = rawBetsText
                .split(/[\s,，\n]+/) // 兼容中英文逗号、空格和换行
                .map(item => item.trim())
                .filter(item => item.length > 0);

            // 3. 解析开奖号码与中奖金额
            let draw_numbers = null;
            let prize_amount = 0;

            if (status !== 'pending') {
                const rawNumbers = document.getElementById('draw_numbers').value;
                draw_numbers = rawNumbers
                    .split(/[\s,，]+/)
                    .map(item => item.trim())
                    .filter(item => item.length > 0);
                
                prize_amount = parseFloat(document.getElementById('prize_amount').value || 0);
            }

            // 4. 将打包好的对象上传至 Supabase
            const { error } = await dbClient
                .from('lottery_records')
                .insert([
                    {
                        issue_number,
                        draw_date,
                        bet_type,
                        bet_amount,
                        my_bets,
                        status,
                        draw_numbers,
                        prize_amount
                    }
                ]);

            // 5. 结果反馈
            if (error) {
                console.error('上传失败:', error);
                alertBox.className = "text-sm p-4 rounded-xl border bg-rose-950/20 border-rose-500/30 text-rose-400";
                alertBox.innerText = `❌ 保存失败: ${error.message}`;
                alertBox.classList.remove('hidden');
                
                submitBtn.disabled = false;
                submitBtn.innerText = '保存记录并上传数据库';
            } else {
                alertBox.className = "text-sm p-4 rounded-xl border bg-emerald-950/20 border-emerald-500/30 text-emerald-400";
                alertBox.innerText = `🎉 第 ${issue_number} 期记录已完美保存！已成功解析 ${my_bets.length} 注大底号码。`;
                alertBox.classList.remove('hidden');
                
                // 重置表单，以便下一轮录入
                document.getElementById('lottery-form').reset();
                document.getElementById('draw_date').valueAsDate = new Date();
                toggleStatusFields('pending');
                
                // 恢复按钮状态
                submitBtn.disabled = false;
                submitBtn.innerText = '保存记录并上传数据库';
                
                // 滚回顶部看成功提示
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
