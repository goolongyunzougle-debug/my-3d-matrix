<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D MATRIX - 福彩数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0B0F19;
        }
    </style>
</head>
<body class="text-slate-100 font-sans antialiased p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-8">
        
        <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl md:text-3xl font-black tracking-tight bg-gradient-to-r from-amber-400 via-orange-400 to-emerald-400 bg-clip-text text-transparent">
                    3D MATRIX
                </h1>
                <p class="text-xs md:text-sm text-slate-400 mt-1">福彩 3D 个人数据资产与投注观测看板</p>
            </div>
            <div class="flex items-center gap-2 self-end md:self-auto text-xs bg-slate-900/80 border border-slate-800 rounded-full px-3 py-1.5 text-slate-400 shadow-inner">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                2026 SUPABASE LIVE
            </div>
        </header>

        <section class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-slate-900/40 border border-slate-800/80 backdrop-blur-md rounded-2xl p-5 shadow-sm hover:border-slate-700 transition-all">
                <p class="text-xs font-medium text-slate-400 tracking-wider uppercase">总投注金额</p>
                <p id="stat-total-bet" class="text-2xl md:text-3xl font-bold text-slate-200 mt-2">¥0.0</p>
            </div>

            <div class="bg-slate-900/40 border border-slate-800/80 backdrop-blur-md rounded-2xl p-5 shadow-sm hover:border-slate-700 transition-all">
                <p class="text-xs font-medium text-slate-400 tracking-wider uppercase">总中奖金额</p>
                <p id="stat-total-prize" class="text-2xl md:text-3xl font-bold text-amber-400 mt-2">¥0.0</p>
            </div>

            <div id="stat-net-profit-card" class="border backdrop-blur-md rounded-2xl p-5 shadow-md transition-all bg-slate-900/40 border-slate-800/80">
                <p class="text-xs font-medium text-slate-400 tracking-wider uppercase">总盈亏净值</p>
                <p id="stat-net-profit" class="text-2xl md:text-3xl font-bold mt-2 text-slate-200">¥0.00</p>
            </div>

            <div class="bg-slate-900/40 border border-slate-800/80 backdrop-blur-md rounded-2xl p-5 shadow-sm hover:border-slate-700 transition-all">
                <p class="text-xs font-medium text-slate-400 tracking-wider uppercase">周期中奖率</p>
                <div class="flex items-baseline gap-2 mt-2">
                    <p id="stat-win-rate" class="text-2xl md:text-3xl font-bold text-slate-200">0%</p>
                    <span class="text-xs text-slate-500">（按期数计）</span>
                </div>
            </div>
        </section>

        <section class="space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-bold text-slate-300 flex items-center gap-2">
                    历史往期明细
                    <span id="record-count-badge" class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full font-normal">加载中...</span>
                </h2>
            </div>

            <div id="records-container" class="space-y-3">
                <div class="text-center py-12 text-slate-500 text-sm">正在实时链接 Supabase 数据库...</div>
            </div>
        </section>
        
    </div>

    <script>
        // ==========================================
        // 🔐 Supabase 初始化配置
        // ==========================================
        const SUPABASE_URL = 'https://ybjgkfhcagqqfnqekycr.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InliamdrZmhjYWdxcWZucWVreWNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTk0OTUsImV4cCI6MjA5NzI3NTQ5NX0.jG4Hm9JPPBQ9J4jQKCtZDa5MDF_vGYlUo7drur8Xv6g';
        
        const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // 📊 实时数据拉取与动态渲染
        // ==========================================
        async function loadAndRenderDashboard() {
            let totalBet = 0;
            let totalPrize = 0;
            let wonCount = 0;
            let totalCount = 0;

            const container = document.getElementById('records-container');

            const { data: records, error } = await dbClient
                .from('lottery_records')
                .select('*')
                .order('draw_date', { ascending: false });

            if (error) {
                console.error('数据库连接失败:', error);
                container.innerHTML = `<div class="text-center py-12 text-rose-400 text-sm">数据加载失败: ${error.message}</div>`;
                return;
            }

            if (!records || records.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-slate-500 text-sm">暂无投注记录，数据库为空。</div>`;
                document.getElementById('record-count-badge').innerText = `0 期`;
                return;
            }

            container.innerHTML = ''; 

            records.forEach(record => {
                const betAmount = parseFloat(record.bet_amount || 0);
                const prizeAmount = parseFloat(record.prize_amount || 0);
                
                totalBet += betAmount;
                totalPrize += prizeAmount;
                if (record.status !== 'pending') totalCount++;
                if (record.status === 'won') wonCount++;

                const itemProfit = prizeAmount - betAmount;
                const totalNumbersCount = record.my_bets ? record.my_bets.length : 0;
                const formattedDate = record.draw_date ? record.draw_date.substring(5) : '未知'; 

                let ballsHtml = `<span class="text-xs text-slate-500 py-1 px-4">等待开奖</span>`;
                if (record.draw_numbers && record.draw_numbers.length > 0) {
                    ballsHtml = record.draw_numbers.map(num => `
                        <span class="w-8 h-8 rounded-full bg-gradient-to-b from-slate-700 to-slate-900 border border-slate-600 shadow-inner flex items-center justify-center text-sm font-black text-amber-400 tracking-tighter">
                            ${num}
                        </span>
                    `).join('');
                }

                let statusBadge = '';
                if (record.status === 'won') {
                    statusBadge = `<span class="inline-flex items-center gap-1 text-[11px] font-medium px-2.5 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 shadow-sm">🎉 已中奖</span>`;
                } else if (record.status === 'lost') {
                    statusBadge = `<span class="inline-flex items-center text-[11px] font-medium px-2.5 py-1 rounded-full bg-slate-800/50 border border-slate-800 text-slate-500">未中奖</span>`;
                } else {
                    statusBadge = `<span class="inline-flex items-center text-[11px] font-medium px-2.5 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400">🛡️ 待开奖</span>`;
                }

                const card = document.createElement('div');
                card.className = "group bg-slate-900/20 border border-slate-800/60 rounded-xl p-4 md:p-5 flex flex-col md:flex-row md:items-center justify-between gap-4 hover:bg-slate-900/40 hover:border-slate-700/80 hover:-translate-y-0.5 transition-all duration-200";
                card.innerHTML = `
                    <div class="flex flex-wrap items-center gap-4 md:gap-6">
                        <div>
                            <div class="text-sm font-semibold text-slate-200">${formattedDate}</div>
                            <div class="text-xs text-slate-500 mt-0.5">第 ${record.issue_number || '---'} 期</div>
                        </div>
                        <div class="flex gap-2 bg-black/20 px-3 py-1.5 rounded-xl border border-slate-800/50">${ballsHtml}</div>
                        <div>
                            <div class="text-xs flex items-center gap-2">
                                <span class="bg-slate-800/80 text-slate-400 px-1.5 py-0.5 rounded text-[10px]">
                                    ${record.bet_type || '直选'}
                                </span>
                                <span class="text-slate-400">
                                    已录入大底：<span class="font-mono text-amber-500 font-bold">${totalNumbersCount}</span> 注号码
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between md:justify-end gap-6 border-t border-slate-800/50 pt-3 md:pt-0 md:border-0">
                        <div>${statusBadge}</div>
                        <div class="text-right">
                            <div class="text-base font-bold font-mono ${itemProfit >= 0 ? 'text-emerald-400' : 'text-slate-400'}">
                                ${itemProfit >= 0 ? '+¥' + itemProfit.toFixed(2) : '-¥' + Math.abs(itemProfit).toFixed(2)}
                            </div>
                            <div class="text-[10px] text-slate-500 mt-0.5">投 ¥${betAmount.toFixed(1)} / 奖 ¥${prizeAmount.toFixed(1)}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            const netProfit = totalPrize - totalBet;
            const winRate = totalCount > 0 ? Math.round((wonCount / totalCount) * 100) : 0;

            // 🚀 核心修改：顶部的总金额统计卡片同样应用 .toFixed(1) 保持一致
            document.getElementById('stat-total-bet').innerText = `¥${totalBet.toFixed(1)}`;
            document.getElementById('stat-total-prize').innerText = `¥${totalPrize.toFixed(1)}`;
            document.getElementById('record-count-badge').innerText = `${records.length} 期`;
            document.getElementById('stat-win-rate').innerText = `${winRate}%`;

            const netProfitEl = document.getElementById('stat-net-profit');
            const netProfitCard = document.getElementById('stat-net-profit-card');
            
            if (netProfit >= 0) {
                netProfitEl.innerText = `+¥${netProfit.toFixed(2)}`;
                netProfitEl.className = "text-2xl md:text-3xl font-bold mt-2 text-emerald-400";
                netProfitCard.className = "border backdrop-blur-md rounded-2xl p-5 shadow-md transition-all bg-emerald-950/10 border-emerald-500/30 shadow-emerald-950/20";
            } else {
                netProfitEl.innerText = `-¥${Math.abs(netProfit).toFixed(2)}`;
                netProfitEl.className = "text-2xl md:text-3xl font-bold mt-2 text-rose-400";
                netProfitCard.className = "border backdrop-blur-md rounded-2xl p-5 shadow-md transition-all bg-rose-950/10 border-rose-500/30 shadow-rose-950/20";
            }
        }

        window.onload = loadAndRenderDashboard;
    </script>
</body>
</html>
